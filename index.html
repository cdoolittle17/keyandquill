<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Monster's Heart by Samantha Doolittle - Purchase Links</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f4f1ea; /* Light paper texture color */
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h1 {
            font-family: 'Garamond', serif;
            font-size: 2.5em;
            margin-bottom: 5px;
            color: #1a1a1a;
        }

        .author {
            font-size: 1.2em;
            color: #555;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .author-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 30px;
            border: 3px solid #f4f1ea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .author-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cta-text {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #444;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .shop-link {
            display: block;
            background: linear-gradient(145deg, #8b0000, #a52a2a); /* Dark red gradient */
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .shop-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
        }

        /* Thorns decoration */
        .thorns {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            height: 20px;
            background-image: url('bbchronicles.png'); /* Using a slice of the original art for the thorns */
            background-repeat: repeat-x;
            background-size: contain;
            opacity: 0.7;
        }

        footer {
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #777;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 25px;
            height: 25px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>A Monster's Heart</h1>
        <p class="author">by Samantha Doolittle</p>

        <div class="author-image">
            <img src="samsam.png" alt="Samantha Doolittle">
        </div>

        <p class="cta-text">Click a link below to buy 'A Monster's Heart' from your favorite online bookstore.</p>

        <div class="links-container">
            <a href="https://shop.ingramspark.com/b/084?params=hNuwERNI1xbkLzPjxr41EnZXyRPrxXJlxOFFklSKMkB" class="shop-link" target="_blank">IngramSpark</a>
            <a href="https://a.co/d/0bZktkRS" class="shop-link" target="_blank">Amazon</a>
            <a href="https://www.walmart.com/ip/Black-Blood-Chronicles-A-Monster-s-Heart-Paperback/20360751631" class="shop-link" target="_blank">Walmart</a>
            <a href="https://ravenbookstore.com/book/9798240943195" class="shop-link" target="_blank">Raven Book Store</a>
            <a href="https://www.booktopia.com.au/a-monster-s-heart-samantha-doolittle/book/9798240943195.html?srsltid=AfmBOoqSDn9m_VByQsC8SimqsldzIHHXGTZ-2uoJ_m4UmXF3WVdBt4g-" class="shop-link" target="_blank">Booktopedia (AU)</a>
            <a href="https://www.foyles.co.uk/book/a-monsters-heart/samantha-doolittle/9798240943195?srsltid=AfmBOoqBxkH-yFeXBZqi7eLxOhdBuDGk7p5YMqAItdU2eBpBV3QwcQqB" class="shop-link" target="_blank">Foyles (UK)</a>
        </div>

        <div class="thorns"></div>

        <footer>
            <div class="logo-container">
                <img src="knq.png" alt="Key & Quill Logo" class="logo">
                <span>© 2024 Key & Quill Press</span>
            </div>
        </footer>
    </div>
</body>
</html>
